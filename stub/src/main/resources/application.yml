spring:
  application:
    name: kafka-stub

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_GROUP_ID:kafka-stub}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      concurrency: ${KAFKA_CONCURRENCY:3}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/kafka_stub}
    username: ${DB_USER:kafka_stub}
    password: ${DB_PASSWORD:kafka_stub}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

stub:
  kafka:
    topic: ${KAFKA_TOPIC:messages}
  delay:
    initial-ms: ${STUB_DELAY_MS:1000}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: kafka-stub
