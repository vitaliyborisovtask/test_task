global:
  scrape_interval: 10s

scrape_configs:
  - job_name: kafka-stub
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["stub:8080"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: kafka
    static_configs:
      - targets: ["kafka-exporter:9308"]

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
